<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fintech Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float iTime;
        uniform vec2 iResolution;
        uniform vec2 iMouse;
        varying vec2 vUv;

        // Optimized pseudo-random noise for organic flow
        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), f.x),
                       mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
        }

        void main() {
            vec2 uv = vUv;
            vec2 mouse = iMouse / iResolution.xy;
            float dist = distance(uv, mouse);
            float glow = 0.3 / (dist + 0.05);
            
            // Correct aspect ratio for noise and waves
            float aspect = iResolution.x / iResolution.y;
            vec2 p = uv;
            p.x *= aspect;
            vec2 m = mouse;
            m.x *= aspect;
            float pDist = distance(p, m);

            // Base colors - Deep Fintech Palette
            vec3 colorBg = vec3(0.01, 0.01, 0.03); // Deep Navy
            vec3 color1 = vec3(0.05, 0.08, 0.25);  // Indigo
            vec3 color2 = vec3(0.15, 0.05, 0.28);  // Deep Purple
            vec3 color3 = vec3(0.25, 0.35, 0.65);  // Soft Blue Highlight
            
            // Layer 1: Slow organic background flow
            float n1 = noise(p * 2.0 + iTime * 0.1);
            float n2 = noise(p * 1.5 - iTime * 0.05);
            
            // Layer 2: Mouse interaction distortion
            float mouseInfluence = smoothstep(0.6, 0.0, pDist);
            
            // Wave distortion based on mouse and time
            vec2 waveUv = p;
            waveUv.x += sin(p.y * 3.0 + iTime * 0.5) * 0.05;
            waveUv.y += cos(p.x * 3.0 + iTime * 0.4) * 0.05;
            
            // Apply mouse-based warping
            waveUv += (p - m) * mouseInfluence * 0.15;
            
            // Layered Gradients
            float g1 = smoothstep(0.2, 0.8, noise(waveUv * 1.2 + iTime * 0.15));
            float g2 = smoothstep(0.3, 0.7, noise(waveUv * 0.8 - iTime * 0.1));
            
            // Blend layers
            vec3 finalColor = colorBg;
            finalColor = mix(finalColor, color1, g1 * 0.6);
            finalColor = mix(finalColor, color2, g2 * 0.4);
            
            // User requested glow logic
            finalColor += color3 * glow * 0.2;
            
            // Subtle animated streaks
            float streaks = sin(p.x * 10.0 + p.y * 5.0 + iTime) * 0.5 + 0.5;
            streaks *= pow(noise(p * 4.0 + iTime * 0.2), 3.0);
            finalColor += vec3(0.1, 0.15, 0.3) * streaks * 0.15;

            // Final contrast and brightness adjustment
            finalColor *= 1.1;
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        /**
         * Senior WebGL Graphics Engineer Implementation
         * Stripe-level Cinematic Background
         */

        const canvas = document.querySelector('#canvas');
        const renderer = new THREE.WebGLRenderer({ 
            canvas, 
            antialias: true,
            powerPreference: "high-performance"
        });

        // Performance Optimization: Limit Pixel Ratio
        const pixelRatio = Math.min(window.devicePixelRatio, 2);
        renderer.setPixelRatio(pixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const geometry = new THREE.PlaneGeometry(2, 2);
        
        // Mouse state with smooth interpolation (lerp)
        const currentMouse = new THREE.Vector2(0, 0);
        const targetMouse = new THREE.Vector2(0, 0);
        
        const uniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth * pixelRatio, window.innerHeight * pixelRatio) },
            iMouse: { value: new THREE.Vector2(0, 0) }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: uniforms
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Accurate Mouse Tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Normalize coordinates relative to canvas and apply pixelRatio
            targetMouse.x = (e.clientX - rect.left) * pixelRatio;
            targetMouse.y = (rect.height - (e.clientY - rect.top)) * pixelRatio;
        });

        // Touch support
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                targetMouse.x = (e.touches[0].clientX - rect.left) * pixelRatio;
                targetMouse.y = (rect.height - (e.touches[0].clientY - rect.top)) * pixelRatio;
            }
        }, { passive: true });

        // Handle Resize
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            renderer.setSize(width, height);
            uniforms.iResolution.value.set(width * pixelRatio, height * pixelRatio);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            uniforms.iTime.value = elapsedTime;

            // Smooth Interpolation (Lerp) for Mouse Motion
            currentMouse.lerp(targetMouse, 0.08);
            uniforms.iMouse.value.copy(currentMouse);

            renderer.render(scene, camera);
        }

        animate();

        // Initial mouse position in center
        targetMouse.x = (window.innerWidth / 2) * pixelRatio;
        targetMouse.y = (window.innerHeight / 2) * pixelRatio;
        currentMouse.copy(targetMouse);

    </script>
</body>
</html>
